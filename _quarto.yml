project:
  type: website

  preview:
    port: 5555
    browser: true
    watch-inputs: true
    navigate: true

  output-dir: docs
  execute-dir: project

  render:
    - "*.qmd"
    - "*.md"
    - "*.ipynb"
    - "!projects/"
    - "!tutorial/"

  resources:
    - "files/**"
    # Things that need to be at the site root
    - ".htaccess"
    - "LiveSearchSite.xml"
    # - "keybase.txt"
    - "y_key_31e0c4105fc75710.html"
    - "pgp_ath.asc.txt"

website:
  title: ""
  image: "/files/profiles/bottts-1774764655644.png"
  favicon: "/files/profiles/bottts-1774764655644.png"
  description: ""
  search:
    location: navbar
    type: overlay
  site-url: "https://grgrzhong.github.io/"
  repo-url: "https://github.com/grgrzhong/quarto"
  back-to-top-navigation: true
  page-navigation: true
  navbar:
    pinned: true
    left:
      - text: "About"
        file: "index.qmd"
      - text: "Blog"
        file: "blog/index.qmd"
      - text: "Linux"
        file: "linux/index.qmd"
      - text: "Python"
        file: "python/index.qmd"
      - text: "R"
        file: "r/index.qmd"
      - text: "Keymap"
